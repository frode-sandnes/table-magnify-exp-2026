<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Only</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }


        div {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: #fff;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3rem; /* "Large letters" */
            margin: 0;
            text-transform: uppercase;
            line-height: 1.1;
        }


    </style>
</head>
<body>

    <div>
        <h1>THIS PAGE CANNOT BE VIEWED ON A SMARTPHONE</h1>
    </div>

</body>
</html>
